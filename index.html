<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chromebook Manager - Sistema Seguro</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Header */
        .header {
            background: white;
            border-radius: 20px;
            padding: 20px 30px;
            margin-bottom: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }

        .header h1 {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .user-email {
            color: #4b5563;
            font-size: 14px;
        }

        .btn-logout {
            background: #ef4444;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
        }

        /* Cards */
        .card {
            background: white;
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 25px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }

        .card-title {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 20px;
            border-left: 4px solid #667eea;
            padding-left: 15px;
        }

        /* Formulário */
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #374151;
            font-size: 14px;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 10px 15px;
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            font-size: 14px;
            transition: all 0.3s;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        /* Botões */
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 14px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #6b7280;
            color: white;
        }

        .btn-danger {
            background: #ef4444;
            color: white;
        }

        /* Tabelas */
        .table-container {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #e5e7eb;
        }

        th {
            background: #f9fafb;
            font-weight: 600;
            color: #374151;
        }

        tr:hover {
            background: #f9fafb;
        }

        /* Alertas */
        .alert {
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 20px;
        }

        .alert-success {
            background: #d1fae5;
            color: #065f46;
            border-left: 4px solid #10b981;
        }

        .alert-error {
            background: #fee2e2;
            color: #991b1b;
            border-left: 4px solid #ef4444;
        }

        .alert-warning {
            background: #fed7aa;
            color: #92400e;
            border-left: 4px solid #f59e0b;
        }

        /* Loading */
        .loading {
            text-align: center;
            padding: 40px;
            font-size: 18px;
            color: #6b7280;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #10b981;
            color: white;
            padding: 12px 20px;
            border-radius: 12px;
            display: none;
            z-index: 1000;
            animation: slideIn 0.3s;
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        /* Badges */
        .badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 600;
        }

        .badge-active {
            background: #d1fae5;
            color: #065f46;
        }

        .badge-cancelled {
            background: #fee2e2;
            color: #991b1b;
        }

        .status-disponivel {
            color: #10b981;
            font-weight: 600;
        }

        .status-limitado {
            color: #f59e0b;
            font-weight: 600;
        }

        .status-indisponivel {
            color: #ef4444;
            font-weight: 600;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                text-align: center;
            }
            
            .form-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header" id="header" style="display: none;">
            <h1>📱 Chromebook Manager Pro</h1>
            <div class="user-info">
                <span class="user-email" id="userEmail"></span>
                <button class="btn-logout" onclick="logout()">🚪 Sair</button>
            </div>
        </div>

        <!-- Login Section -->
        <div id="loginSection" class="card">
            <div class="card-title">🔐 Login para Acessar o Sistema</div>
            <div id="loginAlert"></div>
            <form id="loginForm">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="loginEmail" required placeholder="seu@email.com">
                </div>
                <div class="form-group">
                    <label>Senha</label>
                    <input type="password" id="loginPassword" required placeholder="********">
                </div>
                <button type="submit" class="btn btn-primary">Entrar</button>
                <button type="button" class="btn btn-secondary" onclick="showRegister()">Cadastrar-se</button>
            </form>
        </div>

        <!-- Register Section -->
        <div id="registerSection" class="card" style="display: none;">
            <div class="card-title">📝 Criar Nova Conta</div>
            <div id="registerAlert"></div>
            <form id="registerForm">
                <div class="form-group">
                    <label>Nome Completo</label>
                    <input type="text" id="registerNome" required>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="registerEmail" required>
                </div>
                <div class="form-group">
                    <label>Senha</label>
                    <input type="password" id="registerPassword" required>
                </div>
                <div class="form-group">
                    <label>Confirmar Senha</label>
                    <input type="password" id="registerConfirmPassword" required>
                </div>
                <button type="submit" class="btn btn-primary">Cadastrar</button>
                <button type="button" class="btn btn-secondary" onclick="showLogin()">Voltar ao Login</button>
            </form>
        </div>

        <!-- Main App Section -->
        <div id="appSection" style="display: none;">
            <!-- Status -->
            <div class="card">
                <div class="card-title">📊 Status do Sistema</div>
                <div id="statusAlert"></div>
                <div class="form-grid">
                    <div class="form-group">
                        <label>Data para Verificação</label>
                        <input type="date" id="verificaData" onchange="atualizarDisponibilidade()">
                    </div>
                    <div class="form-group">
                        <label>Total Chromebooks</label>
                        <input type="text" id="totalChromebooks" readonly disabled>
                    </div>
                    <div class="form-group">
                        <label>Meus Agendamentos Hoje</label>
                        <input type="text" id="meusAgendamentos" readonly disabled>
                    </div>
                </div>
            </div>

            <!-- Disponibilidade por Aula -->
            <div class="card">
                <div class="card-title">📊 Disponibilidade por Aula</div>
                <div class="table-container">
                    <table id="tabelaDisponibilidade">
                        <thead>
                            <tr><th>Aula</th><th>Início</th><th>Término</th><th>Disponível</th><th>Status</th></tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>

            <!-- Formulário de Agendamento -->
            <div class="card">
                <div class="card-title">📝 Novo Agendamento</div>
                <form id="formAgendamento">
                    <div class="form-grid">
                        <div class="form-group">
                            <label>Professor *</label>
                            <input type="text" id="professor" required readonly disabled>
                        </div>
                        <div class="form-group">
                            <label>Turma *</label>
                            <select id="turma" required></select>
                        </div>
                        <div class="form-group">
                            <label>Quantidade *</label>
                            <input type="number" id="quantidade" min="1" max="30" value="10" required>
                        </div>
                        <div class="form-group">
                            <label>Data *</label>
                            <input type="date" id="dataRetirada" required>
                        </div>
                        <div class="form-group">
                            <label>Horário Retirada *</label>
                            <select id="horarioRetirada" required></select>
                        </div>
                        <div class="form-group">
                            <label>Horário Devolução *</label>
                            <select id="horarioDevolucao" required></select>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Observações</label>
                        <textarea id="observacoes" rows="3"></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary">➕ Adicionar Agendamento</button>
                    <button type="button" class="btn btn-secondary" onclick="limparFormulario()">🗑️ Limpar</button>
                </form>
            </div>

            <!-- Meus Agendamentos -->
            <div class="card">
                <div class="card-title">📋 Meus Agendamentos</div>
                <div id="loadingAgendamentos" class="loading">Carregando...</div>
                <div class="table-container" id="tabelaContainer" style="display: none;">
                    <table id="tabelaAgendamentos">
                        <thead>
                            <tr>
                                <th>Data</th>
                                <th>Turma</th>
                                <th>Quantidade</th>
                                <th>Retirada</th>
                                <th>Devolução</th>
                                <th>Status</th>
                                <th>Ações</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script>
        // ============================================
        // CONFIGURAÇÃO SEGURA (Variáveis do Netlify)
        // ============================================
        const SUPABASE_URL = '{{SUPABASE_URL}}';
        const SUPABASE_ANON_KEY = '{{SUPABASE_ANON_KEY}}';

        // Validação de segurança
        if (SUPABASE_URL === '{{SUPABASE_URL}}' || SUPABASE_ANON_KEY === '{{SUPABASE_ANON_KEY}}') {
            document.body.innerHTML = '<div class="container"><div class="card alert-error" style="padding: 40px; text-align: center;"><h2>❌ Erro de Configuração</h2><p>As variáveis de ambiente não foram configuradas corretamente no Netlify.</p><p>Contate o administrador do sistema.</p></div></div>';
            throw new Error('Variáveis de ambiente não configuradas');
        }

        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        // ============================================
        // VARIÁVEIS GLOBAIS
        // ============================================
        let usuarioAtual = null;
        let turmas = [];
        let horarios = {
            retirada: ["07:00", "07:50", "09:00", "09:50", "10:40", "12:20", "13:10"],
            devolucao: ["07:50", "08:40", "09:50", "10:40", "11:30", "13:10", "14:00"]
        };
        
        const aulas = [
            { periodo: "1ª Aula", inicio: "07:00", fim: "07:50" },
            { periodo: "2ª Aula", inicio: "07:50", fim: "08:40" },
            { periodo: "3ª Aula", inicio: "09:00", fim: "09:50" },
            { periodo: "4ª Aula", inicio: "09:50", fim: "10:40" },
            { periodo: "5ª Aula", inicio: "10:40", fim: "11:30" },
            { periodo: "6ª Aula", inicio: "12:20", fim: "13:10" },
            { periodo: "7ª Aula", inicio: "13:10", fim: "14:00" }
        ];

        // ============================================
        // FUNÇÕES DE UTILIDADE
        // ============================================
        function mostrarToast(mensagem, tipo = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = mensagem;
            toast.style.backgroundColor = tipo === 'success' ? '#10b981' : tipo === 'error' ? '#ef4444' : '#f59e0b';
            toast.style.display = 'block';
            setTimeout(() => {
                toast.style.display = 'none';
            }, 3000);
        }

        function mostrarAlerta(elementId, mensagem, tipo) {
            const alertDiv = document.getElementById(elementId);
            alertDiv.innerHTML = `<div class="alert alert-${tipo}">${mensagem}</div>`;
            setTimeout(() => {
                alertDiv.innerHTML = '';
            }, 5000);
        }

        // ============================================
        // AUTENTICAÇÃO
        // ============================================
        async function checkSession() {
            const { data: { session } } = await supabase.auth.getSession();
            if (session) {
                usuarioAtual = session.user;
                await carregarPerfil();
                document.getElementById('loginSection').style.display = 'none';
                document.getElementById('registerSection').style.display = 'none';
                document.getElementById('appSection').style.display = 'block';
                document.getElementById('header').style.display = 'flex';
                document.getElementById('userEmail').textContent = usuarioAtual.email;
                document.getElementById('professor').value = usuarioAtual.email;
                await carregarDadosIniciais();
            } else {
                document.getElementById('loginSection').style.display = 'block';
                document.getElementById('registerSection').style.display = 'none';
                document.getElementById('appSection').style.display = 'none';
                document.getElementById('header').style.display = 'none';
            }
        }

        async function carregarPerfil() {
            const { data, error } = await supabase
                .from('perfis')
                .select('*')
                .eq('id', usuarioAtual.id)
                .single();
            
            if (error && error.code !== 'PGRST116') {
                console.error('Erro ao carregar perfil:', error);
            }
        }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            
            const { data, error } = await supabase.auth.signInWithPassword({
                email, password
            });
            
            if (error) {
                mostrarAlerta('loginAlert', error.message, 'error');
            } else {
                mostrarToast('Login realizado com sucesso!');
                checkSession();
            }
        });

        function showRegister() {
            document.getElementById('loginSection').style.display = 'none';
            document.getElementById('registerSection').style.display = 'block';
        }

        function showLogin() {
            document.getElementById('loginSection').style.display = 'block';
            document.getElementById('registerSection').style.display = 'none';
        }

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const nome = document.getElementById('registerNome').value;
            const email = document.getElementById('registerEmail').value;
            const password = document.getElementById('registerPassword').value;
            const confirmPassword = document.getElementById('registerConfirmPassword').value;
            
            if (password !== confirmPassword) {
                mostrarAlerta('registerAlert', 'As senhas não coincidem', 'error');
                return;
            }
            
            const { data, error } = await supabase.auth.signUp({
                email, password,
                options: { data: { nome_completo: nome } }
            });
            
            if (error) {
                mostrarAlerta('registerAlert', error.message, 'error');
            } else {
                mostrarToast('Cadastro realizado! Faça login para continuar.', 'success');
                showLogin();
            }
        });

        async function logout() {
            await supabase.auth.signOut();
            usuarioAtual = null;
            checkSession();
            mostrarToast('Logout realizado com sucesso!');
        }

        // ============================================
        // FUNÇÕES PRINCIPAIS DO SISTEMA
        // ============================================
        async function carregarDadosIniciais() {
            await carregarTurmas();
            await carregarConfiguracoes();
            preencherHorarios();
            document.getElementById('verificaData').valueAsDate = new Date();
            document.getElementById('dataRetirada').valueAsDate = new Date();
            await atualizarDisponibilidade();
            await carregarMeusAgendamentos();
        }

        async function carregarTurmas() {
            const { data, error } = await supabase
                .from('turmas')
                .select('*')
                .eq('ativo', true)
                .order('ordem');
            
            if (error) {
                console.error('Erro ao carregar turmas:', error);
                return;
            }
            
            turmas = data;
            const select = document.getElementById('turma');
            select.innerHTML = '<option value="">Selecione uma turma</option>';
            turmas.forEach(turma => {
                const option = document.createElement('option');
                option.value = turma.id;
                option.textContent = turma.nome;
                select.appendChild(option);
            });
        }

        async function carregarConfiguracoes() {
            const { data, error } = await supabase
                .from('configuracoes')
                .select('*');
            
            if (error) {
                console.error('Erro ao carregar configurações:', error);
                return;
            }
            
            const configMap = {};
            data.forEach(c => configMap[c.chave] = c.valor);
            
            document.getElementById('totalChromebooks').value = configMap.total_chromebooks || '100';
        }

        function preencherHorarios() {
            const selectRetirada = document.getElementById('horarioRetirada');
            const selectDevolucao = document.getElementById('horarioDevolucao');
            
            selectRetirada.innerHTML = '';
            selectDevolucao.innerHTML = '';
            
            horarios.retirada.forEach(h => {
                const option = document.createElement('option');
                option.value = h;
                option.textContent = h;
                selectRetirada.appendChild(option);
            });
            
            horarios.devolucao.forEach(h => {
                const option = document.createElement('option');
                option.value = h;
                option.textContent = h;
                selectDevolucao.appendChild(option);
            });
            
            selectRetirada.value = '07:00';
            selectDevolucao.value = '14:00';
        }

        async function verificarDisponibilidadePorAula(data, aula) {
            const { data: result, error } = await supabase
                .rpc('verificar_disponibilidade', {
                    p_data: data,
                    p_horario_retirada: aula.inicio,
                    p_horario_devolucao: aula.fim,
                    p_quantidade: 1
                });
            
            if (error) {
                console.error('Erro ao verificar disponibilidade:', error);
                return { disponivel: 0, totalAgendado: 0 };
            }
            
            const totalDisponivel = parseInt(document.getElementById('totalChromebooks').value);
            const totalAgendado = await calcularTotalAgendado(data, aula);
            const disponivel = totalDisponivel - totalAgendado;
            
            return { disponivel, totalAgendado };
        }

        async function calcularTotalAgendado(data, aula) {
            const { count, error } = await supabase
                .from('agendamentos')
                .select('*', { count: 'exact', head: true })
                .eq('data', data)
                .eq('status', 'ativo')
                .lt('horario_retirada', aula.fim)
                .gt('horario_devolucao', aula.inicio);
            
            if (error) return 0;
            return count || 0;
        }

        async function atualizarDisponibilidade() {
            const data = document.getElementById('verificaData').value;
            if (!data) return;
            
            const tbody = document.querySelector('#tabelaDisponibilidade tbody');
            tbody.innerHTML = '';
            
            for (const aula of aulas) {
                const { disponivel } = await verificarDisponibilidadePorAula(data, aula);
                
                let status = '';
                let statusClass = '';
                if (disponivel <= 0) {
                    status = '❌ INDISPONÍVEL';
                    statusClass = 'status-indisponivel';
                } else if (disponivel <= 30) {
                    status = '⚠️ LIMITADO';
                    statusClass = 'status-limitado';
                } else {
                    status = '✅ DISPONÍVEL';
                    statusClass = 'status-disponivel';
                }
                
                const row = tbody.insertRow();
                row.insertCell(0).textContent = aula.periodo;
                row.insertCell(1).textContent = aula.inicio;
                row.insertCell(2).textContent = aula.fim;
                row.insertCell(3).textContent = disponivel;
                row.insertCell(4).innerHTML = `<span class="${statusClass}">${status}</span>`;
            }
        }

        async function carregarMeusAgendamentos() {
            document.getElementById('loadingAgendamentos').style.display = 'block';
            document.getElementById('tabelaContainer').style.display = 'none';
            
            const { data, error } = await supabase
                .from('agendamentos')
                .select('*')
                .eq('professor_id', usuarioAtual.id)
                .order('data', { ascending: false });
            
            if (error) {
                mostrarToast('Erro ao carregar agendamentos', 'error');
                return;
            }
            
            const tbody = document.querySelector('#tabelaAgendamentos tbody');
            tbody.innerHTML = '';
            
            // Atualizar contador
            const agendamentosHoje = data.filter(a => a.data === new Date().toISOString().split('T')[0]).length;
            document.getElementById('meusAgendamentos').value = agendamentosHoje;
            
            if (data && data.length > 0) {
                data.forEach(ag => {
                    const row = tbody.insertRow();
                    row.insertCell(0).textContent = ag.data;
                    row.insertCell(1).textContent = ag.turma_nome;
                    row.insertCell(2).textContent = ag.quantidade;
                    row.insertCell(3).textContent = ag.horario_retirada;
                    row.insertCell(4).textContent = ag.horario_devolucao;
                    row.insertCell(5).innerHTML = `<span class="badge badge-${ag.status}">${ag.status}</span>`;
                    
                    const acoes = row.insertCell(6);
                    if (ag.status === 'ativo' && ag.data >= new Date().toISOString().split('T')[0]) {
                        acoes.innerHTML = `<button class="btn btn-danger" onclick="cancelarAgendamento(${ag.id})" style="padding: 5px 10px; font-size: 12px;">Cancelar</button>`;
                    } else {
                        acoes.innerHTML = '-';
                    }
                });
            } else {
                const row = tbody.insertRow();
                const cell = row.insertCell(0);
                cell.colSpan = 7;
                cell.textContent = 'Nenhum agendamento encontrado';
                cell.style.textAlign = 'center';
                cell.style.padding = '40px';
            }
            
            document.getElementById('loadingAgendamentos').style.display = 'none';
            document.getElementById('tabelaContainer').style.display = 'block';
        }

        document.getElementById('formAgendamento').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const turmaId = document.getElementById('turma').value;
            const turmaNome = turmas.find(t => t.id == turraId)?.nome;
            const quantidade = parseInt(document.getElementById('quantidade').value);
            const data = document.getElementById('dataRetirada').value;
            const horarioRetirada = document.getElementById('horarioRetirada').value;
            const horarioDevolucao = document.getElementById('horarioDevolucao').value;
            const observacoes = document.getElementById('observacoes').value;
            
            if (!turmaId) {
                mostrarToast('Selecione uma turma', 'error');
                return;
            }
            
            if (data < new Date().toISOString().split('T')[0]) {
                mostrarToast('Não é possível agendar para datas passadas', 'error');
                return;
            }
            
            const novoAgendamento = {
                id: Date.now(),
                professor_id: usuarioAtual.id,
                professor_nome: usuarioAtual.email,
                turma_id: turmaId,
                turma_nome: turmaNome,
                quantidade,
                data,
                horario_retirada: horarioRetirada,
                horario_devolucao: horarioDevolucao,
                observacoes,
                status: 'ativo',
                ip_criacao: await getClientIP(),
                user_agent: navigator.userAgent
            };
            
            const { error } = await supabase
                .from('agendamentos')
                .insert([novoAgendamento]);
            
            if (error) {
                mostrarToast('Erro ao criar agendamento: ' + error.message, 'error');
            } else {
                mostrarToast('Agendamento criado com sucesso!');
                limparFormulario();
                await carregarMeusAgendamentos();
                await atualizarDisponibilidade();
            }
        });

        async function cancelarAgendamento(id) {
            if (!confirm('Tem certeza que deseja cancelar este agendamento?')) return;
            
            const { error } = await supabase
                .from('agendamentos')
                .update({ status: 'cancelado' })
                .eq('id', id);
            
            if (error) {
                mostrarToast('Erro ao cancelar agendamento', 'error');
            } else {
                mostrarToast('Agendamento cancelado com sucesso!');
                await carregarMeusAgendamentos();
                await atualizarDisponibilidade();
            }
        }

        async function getClientIP() {
            try {
                const response = await fetch('https://api.ipify.org?format=json');
                const data = await response.json();
                return data.ip;
            } catch {
                return null;
            }
        }

        function limparFormulario() {
            document.getElementById('turma').value = '';
            document.getElementById('quantidade').value = '10';
            document.getElementById('dataRetirada').valueAsDate = new Date();
            document.getElementById('horarioRetirada').value = '07:00';
            document.getElementById('horarioDevolucao').value = '14:00';
            document.getElementById('observacoes').value = '';
        }

        // ============================================
        // INICIALIZAÇÃO
        // ============================================
        checkSession();
    </script>
</body>
</html>
